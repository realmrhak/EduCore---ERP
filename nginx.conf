# ═══════════════════════════════════════════════════════════
# EduCore ERP — Nginx Production Configuration
# Place in /etc/nginx/sites-available/educore
# Symlink to /etc/nginx/sites-enabled/educore
# ═══════════════════════════════════════════════════════════

# Rate limiting zone (defined at http level, reference in server block)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Upstream for Node.js backend
upstream educore_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL Configuration ───
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;

    # ─── Security Headers ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── API Proxy ───
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Auth endpoints — stricter rate limiting ───
    location /api/auth/login {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/forgot-password {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check ───
    location /health {
        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Uploads ───
    location /uploads/ {
        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache uploaded files for 7 days
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── WebSocket for Socket.io ───
    location /socket.io/ {
        proxy_pass http://educore_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── React Frontend (Static Files) ───
    location / {
        root /var/www/educore/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Hashed assets (JS/CSS with content hash) — cache for 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/educore/frontend/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Deny access to hidden files ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
